<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>番外 - 星球漫画</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg-color: #FDF7E8;
      --card-bg: #FFFFFF;
      --text-main: #3A4A35;
      --text-sub: #7A8B74;
      --text-desc: #9B988A;
      --shadow-soft: 0 8px 24px rgba(138, 154, 134, 0.12);
      --border-soft: rgba(138, 154, 134, 0.14);
    }

    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    .page {
      width: 100%;
      max-width: 420px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 28px 20px 48px;
    }

    .back {
      display: inline-flex;
      color: var(--text-sub);
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 28px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .desc {
      font-size: 14px;
      color: var(--text-sub);
      line-height: 1.8;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-sub);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .section-title::before,
    .section-title::after {
      content: "✦";
      font-size: 10px;
      color: #D3DABF;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .card {
      display: flex;
      gap: 14px;
      align-items: center;
      background: var(--card-bg);
      border: 1px solid var(--border-soft);
      border-radius: 24px;
      padding: 16px;
      text-decoration: none;
      color: inherit;
      box-shadow: var(--shadow-soft);
      transition: all 0.25s ease;
    }

    .card:active {
      transform: scale(0.98);
      opacity: 0.86;
    }

    .cover {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      object-fit: cover;
      flex-shrink: 0;
      background: linear-gradient(135deg, #E8F0E1, #FFF2D1);
    }

    .card-body {
      min-width: 0;
      flex: 1;
    }

    .card-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-desc);
      line-height: 1.6;
    }

    .empty {
      color: var(--text-desc);
      padding: 24px;
      background: rgba(255,255,255,.75);
      border-radius: 20px;
      text-align: center;
      box-shadow: var(--shadow-soft);
      line-height: 1.7;
    }
  </style>
</head>

<body>
  <main class="page">
    <a class="back" href="index.html">← 返回首页</a>

    <header class="page-header">
      <h1>番外</h1>
      <div class="desc">不定期掉落的小片段。</div>
    </header>

    <div class="section-title"></div>

    <section class="grid" id="extraGrid"></section>
  </main>

  <script>
    async function openFirstExtra(sectionId) {
  try {
    const res = await fetch(`content/extra/${sectionId}/index.json`);
    if (!res.ok) throw new Error("找不到 index.json");

    const files = await res.json();

    if (!files.length) {
      alert("这个番外系列还没有内容");
      return;
    }

    window.location.href = `extra-detail.html?section=${sectionId}&file=${files[0]}`;
  } catch (err) {
    alert("没有读取到这个番外系列");
  }
}
    async function loadExtras() {
      const grid = document.getElementById("extraGrid");

      try {
        const res = await fetch("data/extra-sections.json");
        if (!res.ok) throw new Error("找不到 extra-sections.json");

        const list = await res.json();

        if (!list.length) {
          grid.innerHTML = '<div class="empty">还没有番外系列。</div>';
          return;
        }

        grid.innerHTML = list.map(item => `
         <a class="card" href="javascript:void(0)" onclick="openFirstExtra('${item.id}')">
            <img class="cover" src="${item.cover || "assets/images/default-cover.png"}" alt="${item.title}">
            <div class="card-body">
              <div class="card-title">${item.title}</div>
              <div class="card-desc">${item.desc || ""}</div>
            </div>
          </a>
        `).join("");

      } catch (err) {
        grid.innerHTML = `
          <div class="empty">
            没有读取到番外目录。<br>
            请检查 data/extra-sections.json
          </div>
        `;
      }
    }

    loadExtras();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>连环画 - 星球漫画</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-color: #FDF7E8;
      --card-bg: #FFFFFF;
      --text-main: #3A4A35;
      --text-sub: #7A8B74;
      --text-desc: #9B988A;
      --shadow-soft: 0 8px 24px rgba(138, 154, 134, 0.12);
      --border-soft: rgba(138, 154, 134, 0.14);
    }

    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    .decorations {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .deco-item {
      position: absolute;
      animation: float-deco 6s ease-in-out infinite;
    }

    @keyframes float-deco {
      0%, 100% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-8px) rotate(2deg);
      }
    }

    .dot {
      width: 8px;
      height: 8px;
      background-color: #FFDE8A;
      border-radius: 50%;
      opacity: 0.6;
    }

    .dot-1 {
      top: 12%;
      right: 15%;
    }

    .dot-2 {
      top: 40%;
      left: 10%;
      background-color: #C6D7BD;
      width: 6px;
      height: 6px;
      animation-delay: 1s;
    }

    .cross {
      width: 12px;
      height: 12px;
      opacity: 0.5;
      top: 70%;
      right: 12%;
      animation-delay: 0.5s;
    }

    .cross::before,
    .cross::after {
      content: "";
      position: absolute;
      background-color: #E2AD88;
    }

    .cross::before {
      top: 5px;
      left: 0;
      width: 12px;
      height: 2px;
    }

    .cross::after {
      top: 0;
      left: 5px;
      width: 2px;
      height: 12px;
    }

    @keyframes slideUpFade {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .page {
      width: 100%;
      max-width: 420px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 28px 20px 48px;
      position: relative;
      z-index: 10;
      animation: slideUpFade 0.8s ease forwards;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--text-sub);
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 28px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      color: var(--text-main);
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .desc {
      font-size: 14px;
      color: var(--text-sub);
      line-height: 1.8;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-sub);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .section-title::before,
    .section-title::after {
      content: "✦";
      font-size: 10px;
      color: #D3DABF;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .card {
      display: flex;
      gap: 14px;
      align-items: center;
      background-color: var(--card-bg);
      border: 1px solid var(--border-soft);
      border-radius: 24px;
      padding: 16px;
      text-decoration: none;
      color: inherit;
      box-shadow: var(--shadow-soft);
      transition: all 0.25s ease;
      cursor: pointer;
    }

    .card:active {
      transform: scale(0.98);
      opacity: 0.86;
    }

    .cover {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      object-fit: cover;
      flex-shrink: 0;
      background: linear-gradient(135deg, #E8F0E1, #FFF2D1);
    }

    .card-body {
      min-width: 0;
      flex: 1;
    }

    .card-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-desc);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .empty {
      color: var(--text-desc);
      padding: 24px;
      background: rgba(255, 255, 255, 0.75);
      border-radius: 20px;
      text-align: center;
      box-shadow: var(--shadow-soft);
      line-height: 1.7;
    }

    @media (min-width: 421px) {
      .page {
        padding-top: 40px;
      }

      .card:hover {
        transform: translateY(-3px);
      }
    }
  </style>
</head>

<body>
  <div class="decorations">
    <div class="deco-item dot dot-1"></div>
    <div class="deco-item dot dot-2"></div>
    <div class="deco-item cross"></div>
  </div>

  <main class="page">
    <a class="back" href="index.html">← 返回首页</a>

    <header class="page-header">
      <h1>连环画</h1>
      <div class="desc">不同的小主题，会慢慢长成一个个小宇宙。</div>
    </header>

    <div class="section-title">选择一个漫画系列</div>

    <section class="grid" id="comicGrid"></section>
  </main>

  <script>
    async function openFirstComic(sectionId) {
      try {
        const res = await fetch(`content/comic/${sectionId}/index.json`);

        if (!res.ok) {
          throw new Error("找不到 index.json");
        }

        const files = await res.json();

        if (!files.length) {
          alert("这个系列还没有内容");
          return;
        }

        window.location.href = `comic-detail.html?section=${sectionId}&file=${files[0]}`;
      } catch (err) {
        alert("没有读取到这个漫画系列");
      }
    }

    async function loadComics() {
      const grid = document.getElementById("comicGrid");

      try {
        const res = await fetch("data/comic-sections.json");

        if (!res.ok) {
          throw new Error("找不到 comic-sections.json");
        }

        const list = await res.json();

        if (!list.length) {
          grid.innerHTML = '<div class="empty">还没有漫画系列。</div>';
          return;
        }

        grid.innerHTML = list.map(item => `
          <a class="card" href="javascript:void(0)" onclick="openFirstComic('${item.id}')">
            <img
              class="cover"
              src="${item.cover || "assets/images/default-cover.png"}"
              alt="${item.title}"
            >
            <div class="card-body">
              <div class="card-title">${item.title}</div>
              <div class="card-desc">${item.desc || ""}</div>
            </div>
          </a>
        `).join("");
      } catch (err) {
        grid.innerHTML = `
          <div class="empty">
            没有读取到漫画目录。<br>
            请检查 data/comic-sections.json
          </div>
        `;
      }
    }

    loadComics();
  </script>
</body>
</html>
